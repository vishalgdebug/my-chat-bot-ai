<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- App header: update these lines with your name, school, and title -->
    <header class="app-header">
      <h1 class="app-title">Final Project — My Knicks Chat App</h1>
      <p class="app-meta"><strong>Name:</strong> Vishal Ghosh &nbsp;|&nbsp; <strong>School:</strong> Aviation Highschool</p>
      <p class="app-subtitle">A chat app about the New York Knickerbockers and their players.</p>
    </header>

    <main class="chat" id="chat">
      <div class="chat-messages" id="messages">
        <div class="message message-ai">
          <div class="message-bubble">
            Hi! Ask me anything to get started.
          </div>
        </div>
      </div>

      <form class="composer" id="composer" autocomplete="off">
        <input
          class="composer-input"
          id="composer-input"
          type="text"
          placeholder="Type a message..."
          required
        />
        <button class="composer-send" id="composer-send" type="submit">
          Send
        </button>
      </form>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
